# Render Blueprint — deploys the GiftLedger stack:
#   * the FastAPI backend (built from the existing Dockerfile) as a web service
#   * the Vite/React frontend as a static site
#
# The database is now an EXTERNAL serverless Postgres (Neon, free tier), not a
# Render-managed DB. No secrets live in this file: DATABASE_URL is set manually
# in the Render dashboard (sync: false) to the Neon connection string, which
# must include `?sslmode=require`.

services:
  # ---- FastAPI backend (Docker) ----
  - type: web
    name: giftledger-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      # External Neon Postgres connection string — set in the Render dashboard,
      # NOT committed. Include `?sslmode=require`. e.g.
      # postgresql+psycopg2://USER:PASSWORD@ep-xxx-pooler.REGION.aws.neon.tech/giftledger?sslmode=require
      - key: DATABASE_URL
        sync: false
      # Allow the frontend origin through CORS. Set explicitly: a fromService
      # host reference resolves to the bare service name, not the full origin.
      # Comma-separated so local dev keeps working (the app splits on comma).
      - key: CORS_ALLOW_ORIGINS
        value: https://giftledger-web.onrender.com,http://localhost:5173
      # Google OAuth client id (public) — used to verify Google Sign-In tokens.
      - key: GOOGLE_CLIENT_ID
        value: 557392690347-6vgsqh0b4cc6r7d6cbv1cgkehbrilamk.apps.googleusercontent.com
      # Secret for signing the app's own JWTs — Render generates a strong value.
      - key: JWT_SECRET
        generateValue: true
      # NOTE: Render sets PORT automatically; the container reads ${PORT}.

  # ---- Vite + React frontend (static site) ----
  - type: web
    name: giftledger-web
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      # Point the frontend at the backend's URL at build time. Set explicitly:
      # a `fromService` host reference did NOT resolve during the static build,
      # so the value must be the full backend URL as a literal string.
      - key: VITE_API_BASE
        value: https://giftledger-api.onrender.com
      # Google OAuth client id (public) — baked into the build for Sign-In.
      - key: VITE_GOOGLE_CLIENT_ID
        value: 557392690347-6vgsqh0b4cc6r7d6cbv1cgkehbrilamk.apps.googleusercontent.com
    routes:
      # SPA fallback so any path serves the app shell.
      - type: rewrite
        source: /*
        destination: /index.html
