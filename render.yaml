# Render Blueprint — deploys the full GiftLedger stack:
#   * a free PostgreSQL database
#   * the FastAPI backend (built from the existing Dockerfile) as a web service
#   * the Vite/React frontend as a static site
#
# No secrets live here: the database URL is generated by Render and injected,
# and the two services discover each other's hosts via `fromService`.

databases:
  - name: giftledger-db
    plan: free
    region: oregon
    databaseName: giftledger
    user: giftledger

services:
  # ---- FastAPI backend (Docker) ----
  - type: web
    name: giftledger-api
    runtime: docker
    plan: free
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /health
    envVars:
      # Connection string from the managed database above.
      - key: DATABASE_URL
        fromDatabase:
          name: giftledger-db
          property: connectionString
      # Allow the frontend origin through CORS (host injected, scheme added by the app).
      - key: CORS_ALLOW_ORIGINS
        fromService:
          type: web
          name: giftledger-web
          property: host
      # NOTE: Render sets PORT automatically; the container reads ${PORT}.

  # ---- Vite + React frontend (static site) ----
  - type: web
    name: giftledger-web
    runtime: static
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    envVars:
      # Point the frontend at the backend's URL at build time. Set explicitly:
      # a `fromService` host reference did NOT resolve during the static build,
      # so the value must be the full backend URL as a literal string.
      - key: VITE_API_BASE
        value: https://giftledger-api.onrender.com
    routes:
      # SPA fallback so any path serves the app shell.
      - type: rewrite
        source: /*
        destination: /index.html
